<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LostLink Offline</title>
    <meta name="theme-color" content="#0f172a" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-text: #082f49;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .card {
            width: min(100%, 440px);
            border: 1px solid var(--border);
            background: rgba(30, 41, 59, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 2.4rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button,
        a {
            appearance: none;
            border: 0;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        button {
            background: var(--accent);
            color: var(--accent-text);
        }

        a {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .small {
            margin-top: 18px;
            font-size: 0.95rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <main class="card">
        <div class="badge">Offline</div>
        <h1>You’re offline</h1>
        <p>LostLink can’t reach the internet right now, so this page is being shown from your device.</p>
        <p>Check your connection and try again. Once you’re back online, the app should reload normally.</p>

        <div class="actions">
            <button id="retryBtn" type="button">Try again</button>
            <a href="/">Go home</a>
        </div>

        <p class="small" id="status">Waiting for connection…</p>
    </main>

    <script>
        const statusEl = document.getElementById("status");
        const retryBtn = document.getElementById("retryBtn");

        retryBtn.addEventListener("click", () => {
            window.location.reload();
        });

        function updateStatus() {
            statusEl.textContent = navigator.onLine
                ? "Connection detected. Reload when ready."
                : "Waiting for connection…";
        }

        window.addEventListener("online", () => {
            updateStatus();
            window.location.reload();
        });

        window.addEventListener("offline", updateStatus);
        updateStatus();
    </script>
</body>

</html>
